<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication | Vemu Library System</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FAF7F2; --parchment: #E8DECE; --navy: #1C2B4A;
      --navy-light: #2E4170; --gold: #C8973A; --white: #FFFFFF; --success: #27ae60;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif; height: 100vh; display: flex;
      align-items: center; justify-content: center; overflow: hidden; background-color: var(--navy);
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(26, 20, 16, 0.5), rgba(26, 20, 16, 0.5)), 
     url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&q=80&w=2000');
      background-size: cover; background-position: center; z-index: -1;
    }

    /* Success Toast */
    #successToast {
      position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
      background: var(--success); color: white; padding: 16px 32px; border-radius: 50px;
      font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: 0.5s ease; z-index: 1000;
    }
    #successToast.show { top: 30px; }

    .auth-container {
      background: var(--white); width: 100%; max-width: 900px; min-height: 550px;
      display: flex; border-radius: 20px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      animation: fadeIn 0.8s ease;
    }
    .auth-visual { flex: 1; background: var(--navy); color: white; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
    .auth-form-area { flex: 1.2; padding: 60px; position: relative; }
    
    .form-content { transition: 0.3s; }
    .hidden { display: none; }

    h1 { font-family: 'Playfair Display', serif; color: var(--navy); margin-bottom: 10px; }
    p { color: #666; font-size: 0.9rem; margin-bottom: 25px; }

    .input-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 8px; color: var(--navy); text-transform: uppercase; }
    input, select { 
        width: 100%; padding: 14px; border-radius: 10px; border: 1.5px solid var(--parchment); 
        background: var(--cream); outline: none; font-family: inherit; transition: 0.3s;
    }
    input:focus, select:focus { border-color: var(--gold); background: white; }

    .btn { 
        width: 100%; padding: 16px; border: none; border-radius: 10px; 
        font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; 
    }
    .btn-primary { background: var(--navy); color: white; }
    .btn-primary:hover { background: var(--navy-light); transform: translateY(-2px); }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

    .switch-text { text-align: center; margin-top: 25px; font-size: 0.9rem; }
    .switch-text a { color: var(--gold); font-weight: 700; cursor: pointer; text-decoration: none; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div id="successToast">✓ Account Created! Please login now.</div>

  <div class="auth-container">
    <div class="auth-visual">
      <h2 style="font-family: 'Playfair Display'; font-size: 2.5rem; margin-bottom: 15px;">Vemu Library</h2>
      <p style="color: rgba(255,255,255,0.7); line-height: 1.6;">"The only thing that you absolutely have to know, is the location of the library." — Albert Einstein</p>
    </div>

    <div class="auth-form-area">
      
      <div id="signupForm" class="form-content">
        <h1>Create Account</h1>
        <p>Join our academic community today.</p>
        <form onsubmit="handleSignup(event)">
          <div class="input-group"><label>Full Name</label><input name="name" type="text" placeholder="Full Name" required></div>
          <div class="input-group"><label>Email Address</label><input name="email" type="email" placeholder="Email" required></div>
          <div class="input-group"><label>Password</label><input name="password" type="password" placeholder="••••••••" required></div>
          <div class="input-group"><label>Role</label>
            <select name="role" required>
              <option value="">Select Role</option>
              <option value="student">Student</option>
              <option value="faculty">Faculty</option>
              <option value="librarian">Librarian</option>
              <option value="admin">Administrator</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Sign Up</button>
        </form>
        <div class="switch-text">Already have an account? <a href="login.html">Login here</a></div>
      </div>
  </div>

<script>
    // SIGNUP LOGIC
    function handleSignup(event) {
        event.preventDefault();
        const formData = new FormData(event.target);
        const name = formData.get('name');
        const email = formData.get('email');
        const password = formData.get('password');
        const role = formData.get('role');

        let users = JSON.parse(localStorage.getItem('vemuUsers')) || [];
        
        if (users.find(u => u.email === email)) {
            alert('Email already registered!');
            return;
        }

        // Store user with their specific role
        users.push({ name, email, password: btoa(password), role });
        localStorage.setItem('vemuUsers', JSON.stringify(users));

        const toast = document.getElementById('successToast');
        toast.classList.add('show');
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2000);
    }

    // LOGIN LOGIC (Update this in your login.html file)
    function handleLogin(event) {
        event.preventDefault();
        
        const emailInput = document.querySelector('input[type="email"]').value;
        const passwordInput = btoa(document.querySelector('input[type="password"]').value);
        const selectedRole = document.getElementById('loginRole').value;

        // 1. Get stored users
        const users = JSON.parse(localStorage.getItem('vemuUsers')) || [];

        // 2. Find the specific user
        const user = users.find(u => u.email === emailInput && u.password === passwordInput);

        if (!user) {
            alert("Invalid email or password.");
            return;
        }

        // 3. Verify Role Match
        if (user.role !== selectedRole) {
            alert(`Access Denied: Your account is registered as ${user.role}, not ${selectedRole}.`);
            return;
        }

        // 4. Proceed with Redirect
        switch (user.role) {
            case 'admin':
                window.location.href = "adminstrator.html";
                break;
            case 'student':
                window.location.href = "studentportal.html";
                break;
            case 'librarian':
                window.location.href = "libraryDashboard.html";
                break;
            case 'faculty':
                window.location.href = "faculty.html";
                break;
            default:
                alert("Role not recognized.");
        }
    }
</script>
</body>
</html>
