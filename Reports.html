<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vemu Library | Analytics & Reports</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --navy: #1C2B4A;
      --navy-dark: #121d33;
      --gold: #C8973A;
      --gold-light: #E8DECE;
      --cream: #FAF7F2;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'DM Sans', sans-serif; 
      background: var(--navy); 
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar - Matching Auth Visual Side */
    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, var(--navy) 0%, var(--navy-dark) 100%);
      border-right: 1px solid rgba(200, 151, 58, 0.2);
      display: flex;
      flex-direction: column;
      padding: 40px 20px;
    }
    .nav-menu a {
      display: flex; align-items: center; gap: 15px; color: rgba(255, 255, 255, 0.6);
      text-decoration: none; padding: 15px 20px; border-radius: 12px; margin-bottom: 8px; transition: 0.3s;
    }

    .nav-menu a:hover, .nav-menu a.active {
      background: var(--gold); color: var(--navy); font-weight: 700;
    }

    /* Main Area - The "Floating Card" */
    .main-content {
      flex: 1;
      padding: 30px;
      display: flex;
      flex-direction: column;
    }

    .glass-card {
      background: var(--white);
      border-radius: 25px;
      flex: 1;
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      overflow-y: auto;
    }

    .header-flex {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 30px; border-bottom: 2px solid var(--cream); padding-bottom: 20px;
    }

    .header-flex h1 { font-family: 'Cormorant Garamond', serif; color: var(--navy); font-size: 2.5rem; }

    /* Stats Grid */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px;
    }

    .stat-box {
      background: var(--cream); padding: 25px; border-radius: 15px;
      border-left: 4px solid var(--gold); transition: 0.3s;
    }
    .stat-box:hover { transform: translateY(-5px); }
    .stat-box p { font-size: 0.75rem; color: #777; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .stat-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: var(--navy); }

    /* Forms & Charts Layout */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    
    .sub-card {
      background: #fff; border: 1px solid #eee; border-radius: 20px; padding: 25px;
    }

    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--navy); font-weight: 600; margin-bottom: 8px; }
    .form-input { 
      width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; 
      background: var(--cream); font-family: inherit;
    }

    .btn-update {
      width: 100%; background: var(--navy); color: white; border: none;
      padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s;
      margin-top: 10px;
    }
    .btn-update:hover { background: var(--gold); color: var(--navy); }

    .chart-container { height: 300px; position: relative; }

     .sidebar h3 { 
        font-family: 'Cormorant Garamond', serif; color: var(--gold-light); 
        text-align: center; margin-bottom: 40px; letter-spacing: 2px;
     }
     .btn-download {
    background: var(--gold);
    color: var(--navy);
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
    margin-left: 650px;
    margin-bottom: 20px;
}
.btn-download:hover {
  background: var(--navy);
  color: var(--gold);
  transform: translateY(-2px);
}
    /* Responsive */
    @media (max-width: 1024px) { .grid-2, .stats-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="sidebar">
     <h3>VEMU ADMIN</h3>

  <div class="nav-menu">
    <a href="adminstrator.html" class="nav-item">
      <i class="fas fa-users-cog"></i> Manage Users
    </a>

    <a href="reports.html" class="nav-item">
      <i class="fas fa-file-invoice"></i> Reports
    </a>

    <a href="backup.html" class="nav-item">
      <i class="fas fa-hdd"></i> Backup & Recovery
    </a>
        <a href="login.html" style="margin-top:50px; color: #f92810;"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </nav>


  <main class="main-content">
    <div class="glass-card">
      <div class="header-flex">
        <h1>Library <em>Analytics</em></h1>
        <div style="text-align: right">
            <span style="font-size: 0.8rem; color: var(--gold); font-weight: 700;">LIVE SYSTEM DATA</span>
        </div>
      </div>
<button class="btn-download" onclick="downloadCSV()">
  <i class="fas fa-download"></i> Download Reports
</button>
      <div class="stats-grid">
        <div class="stat-box">
          <p>Total Collection</p>
          <h3 id="totalBooks">0</h3>
        </div>
        <div class="stat-box">
          <p>Circulating</p>
          <h3 id="issuedBooks">0</h3>
        </div>
        <div class="stat-box">
          <p>Overdue Notices</p>
          <h3 id="overdueBooks">0</h3>
        </div>
      </div>

      <div class="grid-2">
        <div class="sub-card">
          <h2 style="font-family:'Cormorant Garamond'; margin-bottom: 20px; color: var(--navy);">Data Entry</h2>
          <form id="reportForm">
            <div class="form-group">
              <label>Total Book Volume</label>
              <input type="number" id="totalInput" class="form-input" required min="0">
            </div>
            <div class="form-group">
              <label>Issued to Students</label>
              <input type="number" id="issuedInput" class="form-input" required min="0">
            </div>
            <div class="form-group">
              <label>Overdue Records</label>
              <input type="number" id="overdueInput" class="form-input" required min="0">
            </div>
            <button type="submit" class="btn-update">Synchronize Reports</button>
          </form>
        </div>

        <div class="sub-card">
          <h2 style="font-family:'Cormorant Garamond'; margin-bottom: 20px; color: var(--navy);">Visual Overview</h2>
          <div class="chart-container">
            <canvas id="statsChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api-service.js"></script>
  <script>
    const totalBooksCard = document.getElementById('totalBooks');
    const issuedBooksCard = document.getElementById('issuedBooks');
    const overdueBooksCard = document.getElementById('overdueBooks');
    const reportForm = document.getElementById('reportForm');
    let statsChart = null;

    async function init() {
        if (!apiService.auth.isAuthenticated()) {
            window.location.href = 'login.html';
            return;
        }
        await loadReportStats();
    }

    async function loadReportStats() {
      try {
          const result = await apiService.request('/reports');
          const stats = Array.isArray(result) ? result[0] : (result.data || result);
          
          if (!stats) {
            // Fallback for demo
            const localStats = JSON.parse(localStorage.getItem('reportStats') || '{"totalBooks":450,"issuedBooks":120,"overdueBooks":15}');
            updateUI(localStats);
            return;
          }

          updateUI(stats);
      } catch (error) {
          console.error("Failed to load reports:", error);
          // Fallback to demo data
          const localStats = JSON.parse(localStorage.getItem('reportStats') || '{"totalBooks":450,"issuedBooks":120,"overdueBooks":15}');
          updateUI(localStats);
      }
    }

    function updateUI(stats) {
      totalBooksCard.textContent = stats.totalBooks || stats.totalBooksVolume || 0;
      issuedBooksCard.textContent = stats.issuedBooks || stats.issuedToStudents || 0;
      overdueBooksCard.textContent = stats.overdueBooks || stats.overdueRecords || 0;
      
      document.getElementById('totalInput').value = stats.totalBooks || stats.totalBooksVolume || 0;
      document.getElementById('issuedInput').value = stats.issuedBooks || stats.issuedToStudents || 0;
      document.getElementById('overdueInput').value = stats.overdueBooks || stats.overdueRecords || 0;

      updateChart(
          stats.totalBooks || stats.totalBooksVolume || 0, 
          stats.issuedBooks || stats.issuedToStudents || 0, 
          stats.overdueBooks || stats.overdueRecords || 0
      );
    }

    function updateChart(total, issued, overdue) {
      const available = Math.max(0, total - issued);
      const ctx = document.getElementById('statsChart').getContext('2d');
      
      if (statsChart) statsChart.destroy();
      
      statsChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Available', 'Issued', 'Overdue'],
          datasets: [{
            data: [available, issued, overdue],
            backgroundColor: ['#1C2B4A', '#C8973A', '#E74C3C'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { font: { family: 'DM Sans' } } } }
        }
      });
    }

    reportForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const total = parseInt(document.getElementById('totalInput').value);
      const issued = parseInt(document.getElementById('issuedInput').value);
      const overdue = parseInt(document.getElementById('overdueInput').value);

      if (issued > total || overdue > issued) {
        alert('Data Mismatch: Issued cannot exceed Total, and Overdue cannot exceed Issued.');
        return;
      }

      try {
        const reportData = {
            totalBooksVolume: total,
            issuedToStudents: issued,
            overdueRecords: overdue,
            generatedBy: apiService.auth.getCurrentUser()?.id || 'admin'
        };
        // Save to localStorage for persistence
        localStorage.setItem('reportStats', JSON.stringify(reportData));
        try {
            await apiService.request('/reports', 'POST', reportData);
        } catch (e) {
            console.log('Backend unavailable, saved locally');
        }
        alert("Statistics synchronized successfully!");
          alert("Statistics synchronized with database.");
          await loadReportStats();
      } catch (error) {
          alert("Error: " + error.message);
      }
    });

    window.onload = init;

    function downloadCSV() {
      const total = totalBooksCard.textContent;
      const issued = issuedBooksCard.textContent;
      const overdue = overdueBooksCard.textContent;
      const date = new Date().toLocaleString();

      const csv = `Date,Total Books,Issued Books,Overdue Books\n${date},${total},${issued},${overdue}`;
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "library_reports.csv";
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
