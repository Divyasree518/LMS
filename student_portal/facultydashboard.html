<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Faculty Dashboard | Library System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #002147;
            --gold: #D4AF37;
            --gold-light: #F1E5AC;
            --white: #FFFFFF;
            --cream: #FDFDFD;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            color: var(--navy);
        }

        /* Navbar & Header */
        .header {
            background: var(--navy);
            color: var(--white);
            padding: 25px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid var(--gold);
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
        }

        .logout-btn {
            background: var(--gold);
            color: var(--navy);
            border: none;
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: var(--white);
            transform: translateY(-2px);
        }

        /* Layout */
        .container { width: 90%; max-width: 1200px; margin: 40px auto; }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* Premium Cards */
        .card {
            background: var(--white);
            padding: 30px;
            border-radius: 0; /* Sophisticated sharp edges */
            border-top: 4px solid var(--gold);
            box-shadow: var(--shadow);
        }

        .card h2 {
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        /* Search Styles */
        .search-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            outline: none;
            font-size: 1rem;
        }

        .search-box input:focus { border-color: var(--gold); }

        /* Book & History Items */
        .book-item, .history-item {
            padding: 15px;
            margin-top: 15px;
            background: var(--cream);
            border: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .book-item:hover {
            border-color: var(--gold);
            background: #fffdf5;
        }

        /* Status Badges */
        .status {
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 2px;
        }
        .available { background: #e6fffa; color: #047857; }
        .borrowed { background: #fff1f2; color: #be123c; }
        .reserved { background: #eff6ff; color: #1d4ed8; }

        /* Form Controls */
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
        }

        .btn-gold {
            background: var(--navy);
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 12px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-gold:hover {
            background: var(--gold);
            color: var(--navy);
        }

        /* --- POPUP MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 33, 71, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            border-bottom: 8px solid var(--gold);
            position: relative;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* --- NOTIFICATIONS --- */
        .notification-area {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: var(--navy);
            color: white;
            padding: 15px 25px;
            margin-bottom: 10px;
            border-left: 5px solid var(--gold);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.5s forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>🏛️VEMU INSTITUTE OF TECHNOLOGY</h1>
            <p style="color: var(--gold)">Faculty Resource Portal </p>
        </div>
        <button class="logout-btn" onclick="triggerModal('Logout', 'Are you sure you wish to end your session?', 'logout')">Exit System</button>
    </div>

    <div class="container">
        <div class="dashboard-grid">
            <div class="card">
                <h2>🔍 Catalog Search</h2>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search by Title, Author or ISBN..." onkeyup="searchBooks()">
                </div>
                <div id="bookList"></div>
            </div>

            <div class="card">
                <h2>📜 Faculty Recommendation</h2>
                <form id="recommendForm">
                    <input type="text" id="bookTitle" placeholder="Book Title *" required>
                    <input type="text" id="bookAuthor" placeholder="Lead Author">
                    <textarea id="recommendReason" rows="4" placeholder="Pedagogical reason for acquisition..."></textarea>
                    <button type="submit" class="btn-gold">SUBMIT REQUEST</button>
                </form>
            </div>

            <div class="card" style="grid-column: span 2;">
                <h2>📋 Borrowing Ledger</h2>
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <div id="notificationArea" class="notification-area"></div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <h2 id="modalTitle" style="font-family: 'Playfair Display'; color: var(--navy);"></h2>
            <p id="modalBody" style="margin: 20px 0; color: #555;"></p>
            <div id="modalActions" style="display: flex; gap: 10px; justify-content: center;">
                </div>
        </div>
    </div>

    <script>
        const books = [
            { id: 1, title: "Artificial Intelligence", author: "Russell & Norvig", status: "available" },
            { id: 2, title: "Clean Code", author: "Robert Martin", status: "borrowed" },
            { id: 3, title: "Design Patterns", author: "GoF", status: "available" }
        ];

        const history = [
            { title: "Quantum Computing", date: "2026-03-01", status: "returned" },
            { title: "Deep Learning", date: "2026-03-20", status: "overdue" }
        ];

        // Initialize
        window.onload = () => {
            displayBooks(books);
            displayHistory();
        };

        function displayBooks(data) {
            const list = document.getElementById('bookList');
            list.innerHTML = data.map(b => `
                <div class="book-item">
                    <div>
                        <strong style="display:block">${b.title}</strong>
                        <small>${b.author}</small>
                    </div>
                    <div>
                        <span class="status ${b.status}">${b.status}</span>
                        <button onclick="confirmReservation(${b.id})" style="margin-left:10px; cursor:pointer; background:none; border:1px solid var(--gold); padding:2px 5px;">Reserve</button>
                    </div>
                </div>
            `).join('');
        }

        function displayHistory() {
            document.getElementById('historyList').innerHTML = history.map(h => `
                <div class="history-item">
                    <span><strong>${h.title}</strong></span>
                    <span>${h.date}</span>
                    <span class="status borrowed">${h.status}</span>
                </div>
            `).join('');
        }

        function searchBooks() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = books.filter(b => b.title.toLowerCase().includes(q));
            displayBooks(filtered);
        }

        // --- NOTIFICATION ENGINE ---
        function notify(msg, type = 'info') {
            const area = document.getElementById('notificationArea');
            const toast = document.createElement('div');
            const emoji = type === 'success' ? '✅' : '⚠️';
            toast.className = 'toast';
            toast.innerHTML = `<span>${emoji}</span> <span>${msg}</span>`;
            area.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // --- MODAL ENGINE ---
        function triggerModal(title, body, actionType, id = null) {
            const overlay = document.getElementById('modalOverlay');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerText = body;
            const actions = document.getElementById('modalActions');
            
            actions.innerHTML = `
                <button class="btn-gold" style="width:auto; padding: 10px 20px" onclick="closeModal()">Cancel</button>
                <button class="logout-btn" style="background:var(--navy); color:var(--gold)" onclick="executeAction('${actionType}', ${id})">Confirm</button>
            `;
            overlay.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function confirmReservation(id) {
            const book = books.find(b => b.id === id);
            if(book.status !== 'available') {
                notify("This volume is currently held by another faculty member.", "error");
                return;
            }
            triggerModal("Confirm Reservation", `Would you like to reserve "${book.title}" for a 60-day faculty period?`, 'reserve', id);
        }

        function executeAction(type, id) {
            closeModal();
            if(type === 'reserve') {
                const book = books.find(b => b.id === id);
                book.status = 'reserved';
                displayBooks(books);
                notify(`Success! ${book.title} is now held at the front desk for you. 🏛️`, 'success');
            } else if(type === 'logout') {
                window.location.reload(); // Simple mock redirect
            }
        }

        document.getElementById('recommendForm').onsubmit = (e) => {
            e.preventDefault();
            const title = document.getElementById('bookTitle').value;
            notify(`Recommendation for "${title}" sent to Library Dean. 📩`, 'success');
            e.target.reset();
        };

    </script>
</body>
</html>
