<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vemu Library | Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --navy: #1C2B4A; --gold: #C8973A; --cream: #FAF7F2; 
            --white: #FFFFFF; --success: #27ae60; --danger: #e74c3c;
            --gray: #718096;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); display: flex; height: 100vh; overflow: hidden; }

        /* Navigation */
        .sidebar { width: 260px; background: var(--navy); color: white; padding: 30px 20px; display: flex; flex-direction: column; }
        .sidebar h2 { font-family: 'Cormorant Garamond'; color: var(--gold); text-align: center; margin-bottom: 40px; letter-spacing: 1px; }
        .nav-menu a {
            display: flex; align-items: center; gap: 12px; color: #cbd5e0;
            text-decoration: none; padding: 14px 18px; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; cursor: pointer;
        }
        .nav-menu a.active { background: var(--gold); color: var(--navy); font-weight: bold; }
        .nav-menu a:hover:not(.active) { background: rgba(255,255,255,0.05); }

        /* Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--white); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #eee; }
        h1 { font-family: 'Cormorant Garamond'; color: var(--navy); margin-bottom: 20px; font-size: 2rem; border-left: 4px solid var(--gold); padding-left: 15px; }

        /* Forms */
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--navy); font-size: 0.85rem; }
        input, select { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; width: 100%; margin-bottom: 20px; font-family: inherit; }
        .btn { padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; font-size: 1rem; }
        .btn-primary { background: var(--navy); color: white; }
        .btn-primary:hover { background: var(--gold); color: var(--navy); }

        /* Calculator UI */
        .fine-box { background: #f8fafc; border-radius: 15px; padding: 25px; border: 2px solid #edf2f7; text-align: center; margin-top: 10px; }
        .amount-circle { width: 120px; height: 120px; border-radius: 50%; margin: 15px auto; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; border: 5px solid; }
        .overdue { color: var(--danger); border-color: var(--danger); background: #fff5f5; }
        .ontime { color: var(--success); border-color: var(--success); background: #f0fff4; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; background: #f8fafc; color: var(--navy); border-bottom: 2px solid var(--gold); }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; color: #4a5568; }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; }
        .b-avail { background: #d1fae5; color: #065f46; }
        .b-issued { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>VEMU ADMIN</h2>
        <nav class="nav-menu">
            <a onclick="showSection('inventory')" class="active" id="link-inventory"><i class="fas fa-list"></i> Inventory</a>
            <a onclick="showSection('circulation')" id="link-circulation"><i class="fas fa-sync"></i> Issue/Return</a>
            <a onclick="showSection('calc')" id="link-calc"><i class="fas fa-calculator"></i> Fine Calculator</a>
            <a onclick="showSection('logs')" id="link-logs"><i class="fas fa-history"></i> Activity Logs</a>
        </nav>
    </div>

    <div class="main-content">
        
        <div id="inventory" class="section active">
            <div class="card">
                <h1>Book <em>Catalog</em></h1>
                <table>
                    <thead><tr><th>ID</th><th>Book Title</th><th>Author</th><th>Status</th></tr></thead>
                    <tbody id="inventoryBody"></tbody>
                </table>
            </div>
        </div>

        <div id="circulation" class="section">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <div class="card">
                    <h1>Issue <em>System</em></h1>
                    <label>Borrower ID</label>
                    <input type="text" id="memberId" placeholder="Enter Student/Faculty ID">
                    <label>Select Book</label>
                    <select id="issueSelect"></select>
                    <button class="btn btn-primary" onclick="handleIssue()">Checkout Book</button>
                </div>
                <div class="card">
                    <h1>Return <em>System</em></h1>
                    <label>Select Book to Return</label>
                    <select id="returnSelect"></select>
                    <button class="btn btn-primary" onclick="handleReturn()">Confirm Return</button>
                </div>
            </div>
        </div>

        <div id="calc" class="section">
            <div class="card" style="max-width: 500px; margin: 0 auto;">
                <h1>Fine <em>Calculator</em></h1>
                <p style="font-size: 0.9rem; color: var(--gray); margin-bottom: 20px;">Current Rate: <strong>₹1.00 / day</strong></p>
                
                <label>Due Date</label>
                <input type="date" id="dueDate">
                
                <label>Actual Return Date</label>
                <input type="date" id="returnDate">
                
                <button class="btn btn-primary" onclick="calculateFine()">Calculate Charges</button>

                <div id="fineResult" style="display:none;" class="fine-box">
                    <h3 id="fineStatusText">Calculation Result</h3>
                    <div id="fineCircle" class="amount-circle">₹0</div>
                    <p id="dayCount" style="font-weight: bold;"></p>
                </div>
            </div>
        </div>

        <div id="logs" class="section">
            <div class="card">
                <h1>Transaction <em>History</em></h1>
                <table>
                    <thead><tr><th>Date</th><th>Member</th><th>Book</th><th>Action</th><th>Fine</th></tr></thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const FINE_PER_DAY = 1; // Updated to 1 Rupee
        let books = JSON.parse(localStorage.getItem('lib_books')) || [
            {id: '101', title: 'Data Structures', author: 'Lafore', status: 'Available'},
            {id: '102', title: 'Python Basics', author: 'Guido', status: 'Available'},
            {id: '103', title: 'Engineering Physics', author: 'Gaur', status: 'Available'}
        ];
        let logs = JSON.parse(localStorage.getItem('lib_logs')) || [];

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-menu a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('link-' + id).classList.add('active');
            renderUI();
        }

        function renderUI() {
            // Inventory Table
            document.getElementById('inventoryBody').innerHTML = books.map(b => `
                <tr>
                    <td>${b.id}</td><td>${b.title}</td><td>${b.author}</td>
                    <td><span class="badge ${b.status === 'Available' ? 'b-avail' : 'b-issued'}">${b.status}</span></td>
                </tr>
            `).join('');

            // Dropdowns
            const iSel = document.getElementById('issueSelect');
            const rSel = document.getElementById('returnSelect');
            iSel.innerHTML = books.filter(b => b.status === 'Available').map(b => `<option value="${b.id}">${b.title}</option>`).join('');
            rSel.innerHTML = books.filter(b => b.status === 'Issued').map(b => `<option value="${b.id}">${b.title}</option>`).join('');

            // History
            document.getElementById('logBody').innerHTML = logs.map(l => `
                <tr><td>${l.date}</td><td>${l.member}</td><td>${l.title}</td><td>${l.type}</td><td>${l.fine}</td></tr>
            `).reverse().join('');

            localStorage.setItem('lib_books', JSON.stringify(books));
            localStorage.setItem('lib_logs', JSON.stringify(logs));
        }

        function handleIssue() {
            const mid = document.getElementById('memberId').value;
            const bid = document.getElementById('issueSelect').value;
            if(!mid || !bid) return alert("Fill all fields");

            const book = books.find(b => b.id === bid);
            book.status = "Issued";
            logs.push({date: new Date().toLocaleDateString(), member: mid, title: book.title, type: "Issued", fine: "-"});
            renderUI();
            alert("Book issued successfully!");
        }

        function handleReturn() {
            const bid = document.getElementById('returnSelect').value;
            if(!bid) return;
            const book = books.find(b => b.id === bid);
            book.status = "Available";
            logs.push({date: new Date().toLocaleDateString(), member: "Admin", title: book.title, type: "Returned", fine: "₹0"});
            renderUI();
            alert("Book returned and inventory updated.");
        }

        function calculateFine() {
            const d1 = new Date(document.getElementById('dueDate').value);
            const d2 = new Date(document.getElementById('returnDate').value);

            if(isNaN(d1) || isNaN(d2)) return alert("Select valid dates");

            const diff = d2 - d1;
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            const fine = days > 0 ? days * FINE_PER_DAY : 0;

            const resDiv = document.getElementById('fineResult');
            const fCircle = document.getElementById('fineCircle');
            const dCount = document.getElementById('dayCount');
            const sText = document.getElementById('fineStatusText');

            resDiv.style.display = 'block';
            fCircle.innerText = `₹${fine}`;
            
            if(days > 0) {
                fCircle.className = 'amount-circle overdue';
                sText.innerText = "Overdue Charges";
                dCount.innerText = `${days} Days Delay`;
            } else {
                fCircle.className = 'amount-circle ontime';
                sText.innerText = "On Time / Early";
                dCount.innerText = "No Fine Applicable";
            }
        }

        window.onload = renderUI;
    </script>
</body>
</html>
