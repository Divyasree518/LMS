<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login | Tovemu Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #002147;
            --gold: #D4AF37;
            --white: #FFFFFF;
            --shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0, 33, 71, 0.85), rgba(0, 33, 71, 0.85)), 
                        url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: var(--white);
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            border-top: 8px solid var(--gold);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .login-container h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--navy);
            margin-bottom: 5px;
        }

        .login-container p {
            color: #666;
            margin-bottom: 35px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.75rem;
            color: var(--navy);
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            outline: none;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }

        input:focus, select:focus {
            border-color: var(--gold);
            background: #fff;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--navy);
            color: var(--gold);
            border: 2px solid var(--gold);
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            margin-top: 15px;
        }

        .btn-login:hover {
            background: var(--gold);
            color: var(--navy);
            transform: translateY(-2px);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 33, 71, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: white;
            padding: 50px;
            max-width: 400px;
            text-align: center;
            border-bottom: 10px solid var(--gold);
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>🏛️ VEMU</h1>
        <p>Role-Based Authentication</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>SELECT SYSTEM ROLE</label>
                <select id="role" required>
                    <option value="" disabled selected>Select your role...</option>
                    <option value="administrator">Administrator</option>
                    <option value="faculty">Faculty</option>
                    <option value="librarian">Librarian</option>
                    <option value="student">Student</option>
                </select>
            </div>

            <div class="form-group">
                <label>USER IDENTIFICATION</label>
                <input type="text" id="username" placeholder="Username or ID" required>
            </div>
            
            <div class="form-group">
                <label>ACCESS KEY</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Verify Identity</button>
        </form>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <h2 style="font-family: 'Playfair Display'; font-size: 2rem; color: var(--navy);">Access Granted 🔓</h2>
            <p id="modalMsg" style="margin: 20px 0; color: #555; font-size: 1.1rem;"></p>
            <div style="color: var(--gold); font-size: 2.5rem; letter-spacing: 10px;">✨✨✨</div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const overlay = document.getElementById('modalOverlay');
            const msg = document.getElementById('modalMsg');
            
            let users = JSON.parse(localStorage.getItem('vemuUsers')) || [];
            const user = users.find(u => u.email === username && atob(u.password) === password);
            
            if (!user) {
                overlay.style.display = 'flex';
                msg.innerHTML = '❌ Not Registered! <br> Please signup first! 🎓📚';
                setTimeout(() => overlay.style.display = 'none', 3000);
                return;
            }
            
            if (user.role !== role.replace('rator', '')) {
                overlay.style.display = 'flex';
                msg.innerHTML = '⚠️ Role mismatch! Contact admin. 🔐';
                setTimeout(() => overlay.style.display = 'none', 3000);
                return;
            }
            
            // Show success popup
            overlay.style.display = 'flex';
            msg.innerHTML = `Welcome ${user.name}!<br>Redirecting to ${role.toUpperCase()} portal... ✨`;
            
            setTimeout(() => {
                let targetPage = "";
                switch(role) {
                    case "administrator":
                        targetPage = "adminstrator.html";
                        break;
                    case "student":
                        targetPage = "student_portal/studentportal.html";
                        break;
                    case "librarian":
                        targetPage = "libraryDashboard.html";
                        break;
                    case "faculty":
                        targetPage = "student_portal/faculty.html";
                        break;
                    default:
                        targetPage = "index.html";
                }
                window.location.href = targetPage;
            }, 2000);
        });
    </script>
</body>
</html>
