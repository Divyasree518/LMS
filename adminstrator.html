<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vemu Library | Manage Users</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --navy: #1C2B4A;
      --navy-dark: #121d33;
      --gold: #C8973A;
      --gold-light: #E8DECE;
      --cream: #FAF7F2;
      --white: #FFFFFF;
      --danger: #f92810;
      --success: #20e170;
      --blue: #3498db;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, var(--navy) 0%, var(--navy-dark) 100%);
      padding: 40px 20px;
      border-right: 1px solid rgba(200, 151, 58, 0.2);
    }

    .sidebar h3 {
      font-family: 'Cormorant Garamond', serif;
      color: var(--gold-light);
      text-align: center;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    .nav-menu a {
      display: flex;
      align-items: center;
      gap: 15px;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      padding: 15px;
      border-radius: 10px;
      transition: 0.3s;
      margin-bottom: 5px;
    }

    .nav-menu a:hover,
    .nav-menu a.active {
      background: var(--gold);
      color: var(--navy);
      font-weight: 700;
    }

    /* Main Content Area */
    .main-content {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .dashboard-card {
      background: var(--white);
      border-radius: 20px;
      min-height: 100%;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    h1,
    h2 {
      font-family: 'Cormorant Garamond', serif;
      color: var(--navy);
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 40px;
      border-top: 1px solid var(--cream);
      padding-top: 30px;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }

    .stat-card {
      background: linear-gradient(135deg, var(--white) 0%, var(--cream) 100%);
      padding: 25px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border-top: 4px solid var(--gold);
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    .stat-card i {
      font-size: 2.5rem;
      color: var(--navy);
      margin-bottom: 10px;
    }

    .stat-card.total i {
      color: var(--navy-dark);
    }

    .stat-card.admin i {
      color: #e74c3c;
    }

    .stat-card.librarian i {
      color: #3498db;
    }

    .stat-card.faculty i {
      color: #f39c12;
    }

    .stat-card.student i {
      color: #27ae60;
    }

    .stat-label {
      display: block;
      font-size: 0.85rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--navy);
      font-family: 'Cormorant Garamond', serif;
    }

    th {
      text-align: left;
      padding: 15px;
      background: var(--cream);
      color: var(--navy);
      border-bottom: 2px solid var(--gold);
      font-size: 0.85rem;
      text-transform: uppercase;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #eee;
      font-size: 0.95rem;
      color: #444;
    }

    .status-active {
      color: var(--success);
      font-weight: bold;
    }

    .status-inactive {
      color: var(--danger);
      font-weight: bold;
    }

    .btn {
      padding: 8px 15px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      font-size: 0.8rem;
    }

    .btn-add {
      background: var(--navy);
      color: white;
      margin-bottom: 20px;
      padding: 12px 25px;
    }

    .btn-add:hover {
      background: var(--gold);
      color: var(--navy);
    }

    .edit-btn {
      background: var(--blue);
      color: white;
      margin-right: 5px;
    }

    .delete-btn {
      background: var(--danger);
      color: white;
    }

    .restore-btn {
      background: var(--success);
      color: white;
    }

    /* Notification Toast */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }

    .toast {
      background: var(--navy);
      color: white;
      padding: 15px 25px;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 5px solid var(--gold);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.5s ease forwards;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
      }

      to {
        transform: translateX(0);
      }
    }

    /* Modals */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(28, 43, 74, 0.8);
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: var(--white);
      margin: 10% auto;
      padding: 30px;
      border-radius: 15px;
      width: 400px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      color: var(--navy);
      margin-bottom: 20px;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      margin: 10px 0 20px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: var(--cream);
    }

    .modal-submit {
      width: 100%;
      background: var(--navy);
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .modal-submit:hover {
      background: var(--gold);
      color: var(--navy);
    }

    .close-btn {
      float: right;
      cursor: pointer;
      font-size: 1.5rem;
      color: #777;
    }
  </style>
</head>

<body>

  <div id="toast-container"></div>

  <div class="sidebar">
    <nav class="nav-menu">
      <h3>VEMU ADMIN</h3>

      <a href="adminstrator.html" class="active"><i class="fas fa-users-cog"></i> Manage Users</a>
      <a href="reports.html"><i class="fas fa-file-invoice"></i> Reports</a>
      <a href="backup.html"><i class="fas fa-hdd"></i> Backup & Recovery</a>
      <a href="login.html" style="margin-top:50px; color: var(--danger);"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </div>

  <div class="main-content">
    <div class="dashboard-card">
      <h1>User Management <em>Portal</em></h1>
      <button class="btn btn-add" id="openAddModal"><i class="fas fa-plus"></i> Add New User</button>

      <table id="usersTable">
        <thead>
          <tr>
            <th>Username</th>
            <th>Role</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><strong>Reshma</strong></td>
            <td>Admin</td>
            <td class="status-active">Active</td>
            <td>
              <button class="btn edit-btn">Edit</button>
              <button class="btn delete-btn">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>

      <h2>Archived / Deleted Users</h2>
      <table id="deletedUsersTable">
        <thead>
          <tr>
            <th>Username</th>
            <th>Role</th>
            <th>Deleted On</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="addModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" id="closeAdd">&times;</span>
      <div class="modal-header">Add New User</div>
      <form id="addForm">
        <label>Username</label><input type="text" id="newUsername" required>
        <label>Role</label>
        <select id="newRole">
          <option>Admin</option>
          <option>Student</option>
          <option>Faculty</option>
        </select>
        <label>Initial Status</label>
        <select id="newStatus">
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
        <button type="submit" class="modal-submit">Create Account</button>
      </form>
    </div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" id="closeEdit">&times;</span>
      <div class="modal-header">Modify User</div>
      <form id="editForm">
        <label>Username</label><input type="text" id="editUsername">
        <label>Role</label>
        <select id="editRole">
          <option>Admin</option>
          <option>Student</option>
          <option>Faculty</option>
        </select>
        <label>Status</label>
        <select id="editStatus">
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
        <button type="submit" class="modal-submit">Save Changes</button>
      </form>
    </div>
  </div>

  <script src="js/api-service.js"></script>
  <script>

    const addModal = document.getElementById('addModal');
    const editModal = document.getElementById('editModal');
    const addForm = document.getElementById('addForm');
    const editForm = document.getElementById('editForm');
    const usersTable = document.getElementById('usersTable').getElementsByTagName('tbody')[0];
    const deletedUsersTable = document.getElementById('deletedUsersTable').getElementsByTagName('tbody')[0];

    // Notification Function
    function showToast(message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<i class="fas fa-check-circle" style="color:var(--success)"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
    }

    // Modal Control
    document.getElementById('openAddModal').onclick = () => addModal.style.display = 'block';
    document.getElementById('closeAdd').onclick = () => addModal.style.display = 'none';
    document.getElementById('closeEdit').onclick = () => editModal.style.display = 'none';

    function attachRowEvents(row) {
      row.querySelector('.edit-btn').onclick = () => {
        document.getElementById('editUsername').value = row.cells[0].innerText;
        document.getElementById('editRole').value = row.cells[1].innerText;
        document.getElementById('editStatus').value = row.cells[2].innerText;
        editModal.style.display = 'block';

        editForm.onsubmit = (e) => {
          e.preventDefault();
          row.cells[0].innerHTML = `<strong>${document.getElementById('editUsername').value}</strong>`;
          row.cells[1].innerText = document.getElementById('editRole').value;
          const status = document.getElementById('editStatus').value;
          row.cells[2].innerText = status;
          row.cells[2].className = status === 'Active' ? 'status-active' : 'status-inactive';
          editModal.style.display = 'none';
          showToast("User details edited successfully!");
        };
      };

      row.querySelector('.delete-btn').onclick = () => {
        const username = row.cells[0].innerText;
        const role = row.cells[1].innerText;
        const date = new Date().toLocaleDateString();

        const delRow = deletedUsersTable.insertRow();
        delRow.innerHTML = `<td><strong>${username}</strong></td><td>${role}</td><td>${date}</td><td><button class="btn restore-btn">Restore</button></td>`;
        row.remove();
        showToast("User deleted successfully!");

        delRow.querySelector('.restore-btn').onclick = () => {
          const restoredRow = usersTable.insertRow();
          restoredRow.innerHTML = `<td><strong>${username}</strong></td><td>${role}</td><td class="status-active">Active</td><td><button class="btn edit-btn">Edit</button> <button class="btn delete-btn">Delete</button></td>`;
          attachRowEvents(restoredRow);
          delRow.remove();
          showToast("User restored successfully!");
        };
      };
    }

    // Load users from localStorage on page load
    let adminUsers = JSON.parse(localStorage.getItem('vemuUsers')) || [];

    function renderUsers() {
      const tbody = document.getElementById('usersTable').getElementsByTagName('tbody')[0];
      tbody.innerHTML = adminUsers.map(u => `
        <tr>
          <td><strong>${u.name}</strong></td>
          <td>${u.role.charAt(0).toUpperCase() + u.role.slice(1)}</td>
          <td class="status-active">Active</td>
          <td><button class="btn edit-btn">Edit</button> <button class="btn delete-btn">Delete</button></td>
        </tr>
      `).join('');

      document.querySelectorAll('#usersTable tbody tr').forEach(row => attachRowEvents(row));
    }

    addForm.onsubmit = (e) => {
      e.preventDefault();
      const username = document.getElementById('newUsername').value;
      const role = document.getElementById('newRole').value.toLowerCase();
      const status = document.getElementById('newStatus').value;

      adminUsers.push({ name: username, role, status });
      localStorage.setItem('vemuUsers', JSON.stringify(adminUsers));

      renderUsers();
      addModal.style.display = 'none';
      addForm.reset();
      showToast("User added successfully!");
      updateDashboard(); // Update stats
    };

    window.onload = renderUsers;
  </script>
</body>

</html>
